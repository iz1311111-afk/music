name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存パッケージをインストール
        run: npm install --no-audit --no-fund

      - name: 静的解析 (ESLint)
        run: npx next lint

      - name: 本番ビルド検証
        run: npm run build

      - name: スモークテスト(トップページが応答するか)
        run: |
          (npm run start &)
          sleep 8
          curl -fsS http://localhost:3000/ -o /dev/null
          echo "smoke test passed"
